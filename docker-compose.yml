services:
  db:
    image: postgres:16-alpine
    container_name: todo-app-db
    environment:
      POSTGRES_DB: todo_app_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todo_app_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: todo-app-server
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/todo_app_db
      JWT_SECRET: change-this-secret-for-real-use
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:8080
      LOG_LEVEL: info
    ports:
      - "5000:5000"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: todo-app-client
    depends_on:
      - server
    ports:
      - "8080:80"

volumes:
  postgres_data:
